---
# PHASE 1: Prepare Common Prerequisites on All Nodes
- name: Prepare prerequisites for Kubernetes
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Disable SWAP (Kubernetes requirement)
      ansible.builtin.shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab*
      changed_when: true
 
    - name: Load required kernel modules (overlay, br_netfilter)
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
 
    - name: Configure sysctl networking parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        state: present
        reload: true
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }
 
    - name: Install ca-certificates and curl
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true
 
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
 
    - name: Clean up any old broken kubernetes repository files from sources.d
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent
 
    - name: FORCE REMOVE broken k8s entry from the main sources.list file
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '.k8s.io.*'
        state: absent
 
    
    - name: Download Kubernetes apt repository public signing key
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        dest: /tmp/kubernetes-release.key
        mode: '0644'
        force: true
 
    - name: De-armor Kubernetes GPG key for apt compatibility
      ansible.builtin.shell:
        cmd: gpg --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes-release.key
 
    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes
        update_cache: true

    - name: Install containerd and Kubernetes components
      ansible.builtin.apt:
        name:
          - containerd
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true
 
    - name: Configure containerd default config file
      ansible.builtin.shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
      changed_when: true
 
    - name: Configure containerd to use SystemdCgroup driver
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: Restart containerd
 
  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true
 
# PHASE 2: Bootstrap Control Plane (Master Node Only)
- name: Initialize Kubernetes Control Plane
  hosts: masters
  become: true
  tasks:
    - name: Initialize the cluster using kubeadm
      ansible.builtin.command:
        cmd: kubeadm init --pod-network-cidr=10.244.0.0/16
      register: kubeadm_init
      changed_when: "'Your Kubernetes control-plane has initialized successfully!' in kubeadm_init.stdout"
 
    - name: Create .kube configuration folder for root user
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'
 
    - name: Setup kubeconfig file for cluster operations
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'
 
    - name: Install Flannel Pod Network CNI
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      changed_when: true
 
    - name: Generate cluster worker join command token
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false
 
    - name: Save generated join token to clean virtual memory host
      ansible.builtin.add_host:
        name: "K8S_JOIN_HOLDER"
        join_command: "{{ join_command_raw.stdout }}"
 
# PHASE 3: Connect Workers to Cluster (Worker Nodes Only)
- name: Join Worker Nodes to Cluster
  hosts: workers
  become: true
  tasks:
    - name: Execute join command on worker nodes
      ansible.builtin.command:
        cmd: "{{ hostvars['K8S_JOIN_HOLDER']['join_command'] }}"
      changed_when: true
